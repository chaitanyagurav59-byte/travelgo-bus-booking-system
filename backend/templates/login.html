<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TravelGo | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg custom-navbar fixed-top">

    <div class="container">

        <a class="navbar-brand text-white fw-bold" href="/">
            🚌 TravelGo
        </a>

    </div>

</nav>

<!-- LOGIN -->

<section class="register-section">

<div class="container">

<div class="register-card">

<div class="row g-0">

<!-- LEFT -->

<div class="col-lg-6">

<div class="register-left">

<h2>Welcome Back!</h2>

<p>

Login to manage bookings, download tickets and enjoy exclusive offers.

</p>

<div class="register-feature">
<i class="fa-solid fa-ticket"></i>
Manage Bookings
</div>

<div class="register-feature">
<i class="fa-solid fa-wallet"></i>
Secure Payments
</div>

<div class="register-feature">
<i class="fa-solid fa-headset"></i>
24×7 Support
</div>

<div class="register-feature">
<i class="fa-solid fa-bus"></i>
5000+ Routes
</div>

</div>

</div>

<!-- RIGHT -->

<div class="col-lg-6">

<div class="register-right">

<h3>Login</h3>

<p class="text-muted mb-4">

Enter your account details.

</p>

{% if error %}

<div class="alert alert-danger">

{{ error }}

</div>

{% endif %}

<form action="/login" method="POST">

<div class="mb-3">

<label>Email Address</label>

<input
type="email"
name="email"
class="form-control"
required>

</div>

<div class="mb-4">

<label>Password</label>

<input
type="password"
name="password"
id="password"
class="form-control"
required>

</div>

<div class="form-check mb-4">

<input
class="form-check-input"
type="checkbox"
id="showPassword">

<label class="form-check-label">

Show Password

</label>

</div>

<button
type="submit"
class="register-btn">

Login

</button>

</form>

<div class="login-text mt-4">

Don't have an account?

<a href="/register">

Register

</a>

</div>

</div>

</div>

</div>

</div>

</div>

</section>

<footer class="footer">

<div class="container">

<p class="text-center mb-0">

© 2026 TravelGo

</p>

</div>

</footer>

<script>

const password=document.getElementById("password");

const check=document.getElementById("showPassword");

check.addEventListener("change",()=>{

password.type=check.checked?"text":"password";

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
